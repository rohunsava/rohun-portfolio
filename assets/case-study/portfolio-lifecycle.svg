<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720" role="img" aria-labelledby="title desc">
  <title id="title">Personal Portfolio Lifecycle</title>
  <desc id="desc">A six-step lifecycle diagram showing strategy, design, build, QA, deploy, and iteration.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fefaf7"/>
      <stop offset="100%" stop-color="#ffffff"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="8" flood-color="#154d57" flood-opacity="0.16"/>
    </filter>
  </defs>
  <rect width="1280" height="720" fill="url(#bg)"/>
  <text x="80" y="86" fill="#7A4A29" font-family="Sora, Arial, sans-serif" font-size="44" font-weight="700">Personal Portfolio Lifecycle</text>
  <text x="80" y="122" fill="#154d57" font-family="Plus Jakarta Sans, Arial, sans-serif" font-size="20">March 2026, iterative delivery loop from strategy through production deployment</text>

  <g font-family="Plus Jakarta Sans, Arial, sans-serif">
    <g transform="translate(80,180)" filter="url(#shadow)">
      <rect width="340" height="120" rx="20" fill="#ffffff" stroke="#154d57" stroke-opacity="0.28"/>
      <text x="24" y="42" fill="#7A4A29" font-size="20" font-weight="700">1. Discovery + Positioning</text>
      <text x="24" y="74" fill="#154d57" font-size="16">Define audience, sections, and portfolio goals.</text>
      <text x="24" y="98" fill="#154d57" font-size="16">Translate LinkedIn/profile data into site content.</text>
    </g>
    <g transform="translate(470,180)" filter="url(#shadow)">
      <rect width="340" height="120" rx="20" fill="#ffffff" stroke="#154d57" stroke-opacity="0.28"/>
      <text x="24" y="42" fill="#7A4A29" font-size="20" font-weight="700">2. Visual System Design</text>
      <text x="24" y="74" fill="#154d57" font-size="16">Build a color hierarchy and typographic rhythm.</text>
      <text x="24" y="98" fill="#154d57" font-size="16">Iterate to align with brand and readability.</text>
    </g>
    <g transform="translate(860,180)" filter="url(#shadow)">
      <rect width="340" height="120" rx="20" fill="#ffffff" stroke="#154d57" stroke-opacity="0.28"/>
      <text x="24" y="42" fill="#7A4A29" font-size="20" font-weight="700">3. Front-End Build</text>
      <text x="24" y="74" fill="#154d57" font-size="16">Implement semantic HTML, CSS system, JS cards.</text>
      <text x="24" y="98" fill="#154d57" font-size="16">Create dedicated project documentation pages.</text>
    </g>

    <g transform="translate(80,390)" filter="url(#shadow)">
      <rect width="340" height="120" rx="20" fill="#ffffff" stroke="#154d57" stroke-opacity="0.28"/>
      <text x="24" y="42" fill="#7A4A29" font-size="20" font-weight="700">4. UX + Content Iteration</text>
      <text x="24" y="74" fill="#154d57" font-size="16">Refine nav, section order, spacing, and copy.</text>
      <text x="24" y="98" fill="#154d57" font-size="16">Add tool showcase, logos, and project details.</text>
    </g>
    <g transform="translate(470,390)" filter="url(#shadow)">
      <rect width="340" height="120" rx="20" fill="#ffffff" stroke="#154d57" stroke-opacity="0.28"/>
      <text x="24" y="42" fill="#7A4A29" font-size="20" font-weight="700">5. Accessibility + Performance</text>
      <text x="24" y="74" fill="#154d57" font-size="16">Skip link, keyboard focus, heading order, contrast.</text>
      <text x="24" y="98" fill="#154d57" font-size="16">Image compression + font/image preload strategy.</text>
    </g>
    <g transform="translate(860,390)" filter="url(#shadow)">
      <rect width="340" height="120" rx="20" fill="#ffffff" stroke="#154d57" stroke-opacity="0.28"/>
      <text x="24" y="42" fill="#7A4A29" font-size="20" font-weight="700">6. Deploy + Measure</text>
      <text x="24" y="74" fill="#154d57" font-size="16">Push to GitHub, auto-deploy via GitHub Pages.</text>
      <text x="24" y="98" fill="#154d57" font-size="16">Validate Lighthouse metrics and iterate again.</text>
    </g>
  </g>

  <g stroke="#154d57" stroke-opacity="0.45" stroke-width="3" fill="none">
    <path d="M420 240 L470 240"/>
    <path d="M810 240 L860 240"/>
    <path d="M1030 300 L1030 390"/>
    <path d="M860 450 L810 450"/>
    <path d="M470 450 L420 450"/>
    <path d="M250 390 L250 300"/>
  </g>
  <g fill="#154d57">
    <polygon points="466,234 482,240 466,246"/>
    <polygon points="856,234 872,240 856,246"/>
    <polygon points="1024,386 1030,402 1036,386"/>
    <polygon points="814,444 798,450 814,456"/>
    <polygon points="424,444 408,450 424,456"/>
    <polygon points="244,304 250,288 256,304"/>
  </g>
</svg>
