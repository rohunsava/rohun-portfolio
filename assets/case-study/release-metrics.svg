<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720" role="img" aria-labelledby="title desc">
  <title id="title">Release Metrics Dashboard</title>
  <desc id="desc">Visual summary of performance, accessibility, and delivery metrics for the portfolio project.</desc>
  <defs>
    <linearGradient id="bg3" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fefaf7"/>
      <stop offset="100%" stop-color="#ffffff"/>
    </linearGradient>
    <filter id="dashShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="8" flood-color="#154d57" flood-opacity="0.15"/>
    </filter>
  </defs>
  <rect width="1280" height="720" fill="url(#bg3)"/>
  <text x="78" y="82" fill="#7A4A29" font-family="Sora, Arial, sans-serif" font-size="42" font-weight="700">Release Performance Snapshot</text>
  <text x="78" y="120" fill="#154d57" font-family="Plus Jakarta Sans, Arial, sans-serif" font-size="20">Measured after deployment on March 6, 2026</text>

  <g font-family="Plus Jakarta Sans, Arial, sans-serif" filter="url(#dashShadow)">
    <g transform="translate(78,170)">
      <rect width="290" height="150" rx="20" fill="#ffffff" stroke="#154d57" stroke-opacity="0.28"/>
      <text x="24" y="44" fill="#7A4A29" font-size="20" font-weight="700">Lighthouse Performance</text>
      <text x="24" y="102" fill="#154d57" font-size="54" font-weight="700">100</text>
    </g>
    <g transform="translate(390,170)">
      <rect width="290" height="150" rx="20" fill="#ffffff" stroke="#154d57" stroke-opacity="0.28"/>
      <text x="24" y="44" fill="#7A4A29" font-size="20" font-weight="700">Lighthouse Accessibility</text>
      <text x="24" y="102" fill="#154d57" font-size="54" font-weight="700">100</text>
    </g>
    <g transform="translate(702,170)">
      <rect width="230" height="150" rx="20" fill="#ffffff" stroke="#154d57" stroke-opacity="0.28"/>
      <text x="24" y="44" fill="#7A4A29" font-size="20" font-weight="700">LCP</text>
      <text x="24" y="102" fill="#154d57" font-size="54" font-weight="700">1.6s</text>
    </g>
    <g transform="translate(954,170)">
      <rect width="230" height="150" rx="20" fill="#ffffff" stroke="#154d57" stroke-opacity="0.28"/>
      <text x="24" y="44" fill="#7A4A29" font-size="20" font-weight="700">CLS</text>
      <text x="24" y="102" fill="#154d57" font-size="54" font-weight="700">0.009</text>
    </g>
  </g>

  <g transform="translate(78,360)">
    <rect width="1106" height="280" rx="24" fill="#ffffff" stroke="#154d57" stroke-opacity="0.24" filter="url(#dashShadow)"/>
    <text x="26" y="44" fill="#7A4A29" font-family="Sora, Arial, sans-serif" font-size="24" font-weight="700">Asset Optimization + Delivery Throughput</text>
    <text x="26" y="78" fill="#154d57" font-family="Plus Jakarta Sans, Arial, sans-serif" font-size="18">Static assets reduced from 6.7 MB to 4.5 MB, with GitHub Pages deploy completing in ~21s.</text>

    <g font-family="Plus Jakarta Sans, Arial, sans-serif">
      <text x="28" y="132" fill="#154d57" font-size="16">Assets before optimization</text>
      <rect x="28" y="146" width="620" height="28" rx="10" fill="#c8d8e4"/>
      <text x="658" y="167" fill="#154d57" font-size="16">6.7 MB</text>

      <text x="28" y="212" fill="#154d57" font-size="16">Assets after optimization</text>
      <rect x="28" y="226" width="416" height="28" rx="10" fill="#154d57"/>
      <text x="454" y="247" fill="#154d57" font-size="16">4.5 MB</text>

      <rect x="770" y="130" width="300" height="124" rx="16" fill="#fefaf7" stroke="#154d57" stroke-opacity="0.22"/>
      <text x="792" y="168" fill="#7A4A29" font-size="18" font-weight="700">Reduction</text>
      <text x="792" y="210" fill="#154d57" font-size="46" font-weight="700">-34%</text>
      <text x="792" y="238" fill="#154d57" font-size="16">2.2 MB less payload</text>
    </g>
  </g>
</svg>
