<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720" role="img" aria-labelledby="title desc">
  <title id="title">Prompt Engineering Loop</title>
  <desc id="desc">Loop diagram showing objective, constraints, implementation, review, and refinement stages.</desc>
  <defs>
    <linearGradient id="bg2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#fefaf7"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="8" flood-color="#154d57" flood-opacity="0.15"/>
    </filter>
  </defs>
  <rect width="1280" height="720" fill="url(#bg2)"/>
  <text x="84" y="82" fill="#7A4A29" font-family="Sora, Arial, sans-serif" font-size="42" font-weight="700">Prompt Engineering Workflow</text>
  <text x="84" y="118" fill="#154d57" font-family="Plus Jakarta Sans, Arial, sans-serif" font-size="20">Structured prompt patterns used to produce design quality, technical rigor, and fast iteration.</text>

  <g transform="translate(640,390)">
    <circle r="205" fill="none" stroke="#154d57" stroke-width="3" stroke-opacity="0.28"/>
    <circle r="120" fill="#ffffff" stroke="#154d57" stroke-opacity="0.24"/>
    <text x="0" y="-8" text-anchor="middle" fill="#7A4A29" font-family="Sora, Arial, sans-serif" font-size="28" font-weight="700">Iteration Loop</text>
    <text x="0" y="24" text-anchor="middle" fill="#154d57" font-family="Plus Jakarta Sans, Arial, sans-serif" font-size="18">Prompt - Build - Test - Refine</text>
  </g>

  <g font-family="Plus Jakarta Sans, Arial, sans-serif" font-size="17">
    <g transform="translate(640,160)" filter="url(#softShadow)">
      <rect x="-170" y="-45" width="340" height="96" rx="18" fill="#ffffff" stroke="#154d57" stroke-opacity="0.3"/>
      <text x="0" y="-10" text-anchor="middle" fill="#7A4A29" font-size="20" font-weight="700">1. Objective Prompt</text>
      <text x="0" y="20" text-anchor="middle" fill="#154d57">Define user request, quality bar, and scope.</text>
    </g>
    <g transform="translate(930,290)" filter="url(#softShadow)">
      <rect x="-170" y="-45" width="340" height="96" rx="18" fill="#ffffff" stroke="#154d57" stroke-opacity="0.3"/>
      <text x="0" y="-10" text-anchor="middle" fill="#7A4A29" font-size="20" font-weight="700">2. Constraint Prompt</text>
      <text x="0" y="20" text-anchor="middle" fill="#154d57">Apply palette, hierarchy, nav, and content rules.</text>
    </g>
    <g transform="translate(930,500)" filter="url(#softShadow)">
      <rect x="-170" y="-45" width="340" height="96" rx="18" fill="#ffffff" stroke="#154d57" stroke-opacity="0.3"/>
      <text x="0" y="-10" text-anchor="middle" fill="#7A4A29" font-size="20" font-weight="700">3. Implementation Prompt</text>
      <text x="0" y="20" text-anchor="middle" fill="#154d57">Generate concrete HTML/CSS/JS changes.</text>
    </g>
    <g transform="translate(640,620)" filter="url(#softShadow)">
      <rect x="-170" y="-45" width="340" height="96" rx="18" fill="#ffffff" stroke="#154d57" stroke-opacity="0.3"/>
      <text x="0" y="-10" text-anchor="middle" fill="#7A4A29" font-size="20" font-weight="700">4. Evaluation Prompt</text>
      <text x="0" y="20" text-anchor="middle" fill="#154d57">Audit contrast, accessibility, and performance.</text>
    </g>
    <g transform="translate(350,500)" filter="url(#softShadow)">
      <rect x="-170" y="-45" width="340" height="96" rx="18" fill="#ffffff" stroke="#154d57" stroke-opacity="0.3"/>
      <text x="0" y="-10" text-anchor="middle" fill="#7A4A29" font-size="20" font-weight="700">5. Refinement Prompt</text>
      <text x="0" y="20" text-anchor="middle" fill="#154d57">Single-change iterations based on feedback.</text>
    </g>
    <g transform="translate(350,290)" filter="url(#softShadow)">
      <rect x="-170" y="-45" width="340" height="96" rx="18" fill="#ffffff" stroke="#154d57" stroke-opacity="0.3"/>
      <text x="0" y="-10" text-anchor="middle" fill="#7A4A29" font-size="20" font-weight="700">6. Release Prompt</text>
      <text x="0" y="20" text-anchor="middle" fill="#154d57">Finalize, deploy, validate, and document.</text>
    </g>
  </g>

  <g stroke="#154d57" stroke-width="3" stroke-opacity="0.45" fill="none">
    <path d="M640 210 L640 245"/>
    <path d="M795 290 L845 290"/>
    <path d="M930 338 L930 452"/>
    <path d="M795 500 L845 500"/>
    <path d="M640 548 L640 573"/>
    <path d="M485 500 L435 500"/>
    <path d="M350 452 L350 338"/>
    <path d="M485 290 L435 290"/>
  </g>
  <g fill="#154d57">
    <polygon points="634,241 640,257 646,241"/>
    <polygon points="841,284 857,290 841,296"/>
    <polygon points="924,448 930,464 936,448"/>
    <polygon points="841,494 857,500 841,506"/>
    <polygon points="634,569 640,585 646,569"/>
    <polygon points="439,494 423,500 439,506"/>
    <polygon points="344,342 350,326 356,342"/>
    <polygon points="439,284 423,290 439,296"/>
  </g>
</svg>
