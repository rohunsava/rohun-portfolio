<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720" role="img" aria-labelledby="title desc">
  <title id="title">Release Metrics Dashboard Dark</title>
  <desc id="desc">Dark mode performance summary with Lighthouse and delivery metrics.</desc>

  <rect width="1280" height="720" fill="#0f1519"/>
  <text x="70" y="72" fill="#78c6cf" font-family="Sora, Arial, sans-serif" font-size="38" font-weight="700">Release Performance Snapshot</text>
  <text x="70" y="104" fill="#bfe7ed" font-family="Plus Jakarta Sans, Arial, sans-serif" font-size="18">Measured after deployment on March 6, 2026</text>

  <g font-family="Plus Jakarta Sans, Arial, sans-serif">
    <g transform="translate(70,140)">
      <rect width="280" height="145" rx="16" fill="#152129" stroke="#78c6cf" stroke-opacity="0.5"/>
      <text x="18" y="40" fill="#78c6cf" font-size="18" font-weight="700">Performance</text>
      <text x="18" y="102" fill="#d7edf1" font-size="52" font-weight="700">100</text>
    </g>
    <g transform="translate(370,140)">
      <rect width="280" height="145" rx="16" fill="#152129" stroke="#78c6cf" stroke-opacity="0.5"/>
      <text x="18" y="40" fill="#78c6cf" font-size="18" font-weight="700">Accessibility</text>
      <text x="18" y="102" fill="#d7edf1" font-size="52" font-weight="700">100</text>
    </g>
    <g transform="translate(670,140)">
      <rect width="250" height="145" rx="16" fill="#152129" stroke="#78c6cf" stroke-opacity="0.5"/>
      <text x="18" y="40" fill="#78c6cf" font-size="18" font-weight="700">LCP</text>
      <text x="18" y="102" fill="#d7edf1" font-size="52" font-weight="700">1.6s</text>
    </g>
    <g transform="translate(940,140)">
      <rect width="250" height="145" rx="16" fill="#152129" stroke="#78c6cf" stroke-opacity="0.5"/>
      <text x="18" y="40" fill="#78c6cf" font-size="18" font-weight="700">CLS</text>
      <text x="18" y="102" fill="#d7edf1" font-size="52" font-weight="700">0.009</text>
    </g>
  </g>

  <g transform="translate(70,325)" font-family="Plus Jakarta Sans, Arial, sans-serif">
    <rect width="1120" height="320" rx="20" fill="#152129" stroke="#78c6cf" stroke-opacity="0.45"/>
    <text x="24" y="42" fill="#78c6cf" font-family="Sora, Arial, sans-serif" font-size="24" font-weight="700">Asset Optimization + Delivery Throughput</text>
    <text x="24" y="72" fill="#d7edf1" font-size="16">Static assets reduced from 6.7 MB to 4.5 MB; deploy completed in about 21 seconds.</text>

    <text x="24" y="126" fill="#bfe7ed" font-size="15">Before optimization</text>
    <rect x="24" y="138" width="620" height="24" rx="10" fill="#355764"/>
    <text x="654" y="156" fill="#bfe7ed" font-size="15">6.7 MB</text>

    <text x="24" y="196" fill="#bfe7ed" font-size="15">After optimization</text>
    <rect x="24" y="208" width="416" height="24" rx="10" fill="#78c6cf"/>
    <text x="450" y="226" fill="#bfe7ed" font-size="15">4.5 MB</text>

    <rect x="760" y="120" width="330" height="130" rx="14" fill="#1a2a33" stroke="#78c6cf" stroke-opacity="0.4"/>
    <text x="782" y="157" fill="#78c6cf" font-size="18" font-weight="700">Payload Reduction</text>
    <text x="782" y="205" fill="#d7edf1" font-size="48" font-weight="700">-34%</text>
    <text x="782" y="234" fill="#bfe7ed" font-size="15">2.2 MB lower transfer size</text>
  </g>
</svg>
